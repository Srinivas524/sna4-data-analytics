<div id="sna4-app">

    <header class="sna4-header">
        <div class="header-left">
            <h1>📊 SNA4 Data Analytics</h1>
            <span class="version-badge">v1.0</span>
        </div>
        <div class="header-right">
            <input type="search" id="global-search" placeholder="Search..." />
            <button id="btn-refresh" title="Refresh">🔄</button>
        </div>
    </header>

    <div class="sna4-layout">

        <nav class="sna4-sidebar">
            <ul>
                <li class="active" data-page="dashboard">📈 Dashboard</li>
                <li data-page="analysis">🔍 Analysis</li>
                <li data-page="reports">📋 Reports</li>
                <li data-page="automation">⚡ Automation</li>
                <li data-page="settings">⚙️ Settings</li>
            </ul>
        </nav>

        <main class="sna4-main">
            <div id="page-dashboard" class="page active">
                <h2>Dashboard</h2>
                <div class="card-grid">
                    <div class="card">
                        <h3>Total Items</h3>
                        <p id="stat-total" class="stat">--</p>
                    </div>
                    <div class="card">
                        <h3>Pending</h3>
                        <p id="stat-pending" class="stat">--</p>
                    </div>
                    <div class="card">
                        <h3>Completed</h3>
                        <p id="stat-completed" class="stat">--</p>
                    </div>
                    <div class="card">
                        <h3>Flagged</h3>
                        <p id="stat-flagged" class="stat">--</p>
                    </div>
                </div>
            </div>

            <div id="page-analysis" class="page">
                <h2>Analysis</h2>
                <p>Coming soon...</p>
            </div>

            <div id="page-reports" class="page">
                <h2>Reports</h2>
                <p>Coming soon...</p>
            </div>

            <div id="page-automation" class="page">
                <h2>Automation</h2>
                <p>Coming soon...</p>
            </div>

            <div id="page-settings" class="page">
                <h2>Settings</h2>
                <p>Coming soon...</p>
            </div>
        </main>
    </div>
</div>
